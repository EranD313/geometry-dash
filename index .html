<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GEOMETRY DASH – 100 Niveaux</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d001f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;user-select:none;touch-action:none;font-family:'Nunito',sans-serif;}
canvas{display:block;}
#hud{position:absolute;top:0;left:0;right:0;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%);}
.hv{font-family:'Boogaloo',sans-serif;font-size:1.35rem;color:#fff;text-shadow:0 0 8px rgba(255,255,255,.35);}
.hvsm{font-family:'Boogaloo',sans-serif;font-size:1rem;color:rgba(255,255,255,.5);}
#pb{position:absolute;top:46px;left:18px;right:18px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;pointer-events:none;}
#pf{height:100%;width:0%;border-radius:3px;transition:width .04s;}
#lvlFlash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Boogaloo',sans-serif;font-size:clamp(2rem,8vw,4rem);letter-spacing:.1em;color:#fff;text-align:center;pointer-events:none;opacity:0;text-shadow:0 0 30px currentColor;transition:opacity .2s;white-space:nowrap;}
#lvlFlash.show{opacity:1;}
#overlay{position:absolute;inset:0;background:rgba(13,0,31,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;backdrop-filter:blur(6px);}
#overlay.gone{display:none;}
.ot{font-family:'Boogaloo',sans-serif;font-size:clamp(2.6rem,10vw,5rem);letter-spacing:.08em;text-align:center;line-height:.95;background:linear-gradient(135deg,#a855f7,#ec4899,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.os{font-size:.78rem;color:rgba(255,255,255,.35);letter-spacing:.16em;text-transform:uppercase;}
.pb2{padding:12px 52px;background:linear-gradient(135deg,#a855f7,#ec4899);border:none;font-family:'Boogaloo',sans-serif;font-size:1.2rem;letter-spacing:.1em;color:#fff;cursor:pointer;border-radius:50px;box-shadow:0 0 22px rgba(168,85,247,.5);transition:all .2s;}
.pb2:hover{transform:scale(1.06);}
#lvlGrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;max-width:min(680px,90vw);padding:0 8px;}
.lbtn{aspect-ratio:1;border:none;border-radius:5px;cursor:pointer;font-family:'Boogaloo',sans-serif;font-size:.8rem;color:#fff;background:rgba(255,255,255,.08);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.lbtn:hover{transform:scale(1.12);}
.lbtn.done{background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.5);}
.lbtn.sel{background:rgba(168,85,247,.4);border:1px solid #a855f7;box-shadow:0 0 10px #a855f755;}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-family:'Boogaloo',sans-serif;font-size:.82rem;color:rgba(255,255,255,.28);letter-spacing:.1em;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hv" id="hLvl">Niveau 1</div>
  <div class="hvsm" id="hPct">0%</div>
  <div class="hvsm" id="hAttempt">Essai 1</div>
</div>
<div id="pb"><div id="pf"></div></div>
<div id="lvlFlash"></div>
<div id="hint">ESPACE · CLIC · TAP → Sauter</div>
<div id="overlay">
  <div class="ot" id="ovTitle">GEOMETRY<br>DASH</div>
  <div class="os" id="ovSub">Sélectionne un niveau</div>
  <div id="lvlGrid"></div>
  <button class="pb2" onclick="playFromMenu()">JOUER</button>
  <div class="os" style="font-size:.68rem">ESPACE · CLIC · TAP pour sauter</div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
resize();addEventListener('resize',resize);

const PAL=[
  {bg0:'#0d001f',bg1:'#1e0050',gr:'#6d28d9',cu:'#a855f7',gl:'#d8b4fe',sp:'#f472b6',bl:'#7c3aed'},
  {bg0:'#001022',bg1:'#002244',gr:'#0369a1',cu:'#38bdf8',gl:'#bae6fd',sp:'#fb923c',bl:'#0284c7'},
  {bg0:'#1a0000',bg1:'#3d0707',gr:'#b91c1c',cu:'#f87171',gl:'#fecaca',sp:'#fbbf24',bl:'#dc2626'},
  {bg0:'#001a00',bg1:'#003300',gr:'#15803d',cu:'#4ade80',gl:'#bbf7d0',sp:'#c084fc',bl:'#166534'},
  {bg0:'#1a1000',bg1:'#332200',gr:'#b45309',cu:'#fbbf24',gl:'#fde68a',sp:'#34d399',bl:'#92400e'},
  {bg0:'#001a1a',bg1:'#003333',gr:'#0e7490',cu:'#22d3ee',gl:'#a5f3fc',sp:'#f9a8d4',bl:'#155e75'},
  {bg0:'#1a001a',bg1:'#330033',gr:'#86198f',cu:'#e879f9',gl:'#f5d0fe',sp:'#67e8f9',bl:'#6b21a8'},
  {bg0:'#0a0a00',bg1:'#1a1a00',gr:'#4d7c0f',cu:'#a3e635',gl:'#d9f99d',sp:'#fb7185',bl:'#365314'},
  {bg0:'#00001a',bg1:'#000033',gr:'#1d4ed8',cu:'#60a5fa',gl:'#bfdbfe',sp:'#f472b6',bl:'#1e3a8a'},
  {bg0:'#1a0a00',bg1:'#330d00',gr:'#c2410c',cu:'#fb923c',gl:'#fed7aa',sp:'#818cf8',bl:'#9a3412'},
];

// Chunk templates: each entry = array of {t,dx,w,h}
const CK={
  gap:[],
  s1:[{t:'s',dx:0,w:34,h:36}],
  s2:[{t:'s',dx:0,w:34,h:36},{t:'s',dx:40,w:34,h:36}],
  s3:[{t:'s',dx:0,w:34,h:36},{t:'s',dx:40,w:34,h:36},{t:'s',dx:80,w:34,h:36}],
  s4:[{t:'s',dx:0,w:34,h:36},{t:'s',dx:40,w:34,h:36},{t:'s',dx:80,w:34,h:36},{t:'s',dx:120,w:34,h:36}],
  b1:[{t:'b',dx:0,w:48,h:44}],
  b1s:[{t:'b',dx:0,w:48,h:44},{t:'s',dx:58,w:34,h:36}],
  b2:[{t:'b',dx:0,w:48,h:44},{t:'b',dx:60,w:48,h:44}],
  bs1:[{t:'b',dx:0,w:48,h:66},{t:'s',dx:62,w:34,h:36}],
  tall:[{t:'b',dx:0,w:48,h:88}],
  s1b1:[{t:'s',dx:0,w:34,h:36},{t:'b',dx:82,w:48,h:44}],
  zz:[{t:'s',dx:0,w:34,h:36},{t:'b',dx:92,w:48,h:44},{t:'s',dx:155,w:34,h:36}],
  tb:[{t:'b',dx:0,w:48,h:44},{t:'s',dx:56,w:34,h:36},{t:'b',dx:104,w:48,h:44}],
};

function makeLevels(){
  const L=[];
  const lv=(n,sp,gv,jm,pi,seq)=>L.push({name:n,sp,gv,jm,pi,seq});
  // World 1: Tutoriel (1-10)
  lv('Tutoriel 1', 5.0,.50,-15.0,0,['gap','s1','gap','gap','s1','gap']);
  lv('Tutoriel 2', 5.0,.50,-15.0,0,['gap','s1','gap','s1','gap','s2','gap']);
  lv('Tutoriel 3', 5.2,.52,-14.8,0,['gap','s1','s1','gap','s2','gap','s1']);
  lv('Tutoriel 4', 5.2,.52,-14.8,0,['gap','b1','gap','s1','gap','b1','gap']);
  lv('Tutoriel 5', 5.3,.53,-14.7,0,['gap','s1','gap','b1','gap','s2','gap','b1']);
  lv('Tutoriel 6', 5.3,.53,-14.7,0,['gap','s2','gap','b1','s1','gap','s2']);
  lv('Tutoriel 7', 5.4,.54,-14.6,0,['gap','b1s','gap','s1','gap','b1s','gap']);
  lv('Tutoriel 8', 5.4,.54,-14.6,0,['gap','s2','b1','gap','s1','s2','gap']);
  lv('Tutoriel 9', 5.5,.55,-14.5,0,['gap','s1','b1s','gap','s2','gap','b1s']);
  lv('Tutoriel 10',5.5,.55,-14.5,0,['gap','s2','gap','s2','b1','gap','s1','s2']);
  // World 2: Facile (11-20)
  lv('Facile 1',  6.0,.58,-14.2,1,['gap','s2','gap','b1','gap','s2','gap']);
  lv('Facile 2',  6.0,.58,-14.2,1,['gap','s1','s2','gap','b1s','gap','s2']);
  lv('Facile 3',  6.1,.59,-14.1,1,['gap','b1','s1','gap','s3','gap','b1']);
  lv('Facile 4',  6.1,.60,-14.0,1,['gap','s3','gap','b1s','gap','s2','b1']);
  lv('Facile 5',  6.2,.60,-14.0,1,['gap','b2','gap','s2','gap','s1','b1s']);
  lv('Facile 6',  6.2,.61,-13.9,1,['gap','s2','b1','gap','s3','gap','b1s']);
  lv('Facile 7',  6.3,.61,-13.9,1,['gap','s1b1','gap','s2','b1','gap','s3']);
  lv('Facile 8',  6.3,.62,-13.8,1,['gap','zz','gap','s2','gap','b1s']);
  lv('Facile 9',  6.4,.62,-13.8,1,['gap','s3','b1','gap','zz','gap']);
  lv('Facile 10', 6.4,.63,-13.7,1,['gap','b2','s1','gap','s3','gap','zz']);
  // World 3: Normal (21-30)
  lv('Normal 1',  6.5,.63,-13.7,2,['gap','s3','gap','b1s','s1','gap','s2']);
  lv('Normal 2',  6.5,.64,-13.6,2,['gap','zz','s1','gap','s3','b1','gap']);
  lv('Normal 3',  6.6,.64,-13.6,2,['gap','b2','gap','s3','gap','zz','s1']);
  lv('Normal 4',  6.6,.65,-13.5,2,['gap','s4','gap','b1s','gap','s3','gap']);
  lv('Normal 5',  6.7,.65,-13.5,2,['gap','s1','s3','gap','b2','s2','gap']);
  lv('Normal 6',  6.7,.66,-13.4,2,['gap','zz','gap','s4','gap','b1s','s1']);
  lv('Normal 7',  6.8,.66,-13.4,2,['gap','bs1','gap','s3','zz','gap']);
  lv('Normal 8',  6.8,.67,-13.3,2,['gap','s4','b1','gap','zz','s2','gap']);
  lv('Normal 9',  6.9,.67,-13.3,2,['gap','bs1','s1','gap','s4','gap','b2']);
  lv('Normal 10', 6.9,.68,-13.2,2,['gap','tb','gap','s3','gap','bs1','gap']);
  // World 4: Medium (31-40)
  lv('Médium 1',  7.0,.68,-13.2,3,['gap','s4','gap','tb','gap','s3']);
  lv('Médium 2',  7.0,.69,-13.1,3,['gap','zz','s2','gap','s4','b1s','gap']);
  lv('Médium 3',  7.1,.69,-13.1,3,['gap','bs1','gap','s4','zz','gap','s2']);
  lv('Médium 4',  7.1,.70,-13.0,3,['gap','tb','s1','gap','bs1','s3','gap']);
  lv('Médium 5',  7.2,.70,-13.0,3,['gap','s4','zz','gap','tb','gap']);
  lv('Médium 6',  7.2,.71,-12.9,3,['gap','b2','s3','gap','s4','bs1','gap']);
  lv('Médium 7',  7.3,.71,-12.9,3,['gap','bs1','zz','gap','s4','gap','b2']);
  lv('Médium 8',  7.3,.72,-12.8,3,['gap','tb','gap','s4','bs1','gap','s3']);
  lv('Médium 9',  7.4,.72,-12.8,3,['gap','s4','tb','gap','zz','s3','gap']);
  lv('Médium 10', 7.4,.73,-12.7,3,['gap','bs1','s4','gap','tb','gap','zz']);
  // World 5: Difficile (41-50)
  lv('Difficile 1', 7.5,.73,-12.7,4,['gap','s4','gap','bs1','tb','gap','s3']);
  lv('Difficile 2', 7.5,.74,-12.6,4,['gap','tb','s2','gap','s4','zz','gap']);
  lv('Difficile 3', 7.6,.74,-12.6,4,['gap','bs1','s4','gap','tb','s1','gap']);
  lv('Difficile 4', 7.6,.75,-12.5,4,['gap','s4','tb','gap','bs1','s4','gap']);
  lv('Difficile 5', 7.7,.75,-12.5,4,['gap','zz','s4','bs1','gap','tb']);
  lv('Difficile 6', 7.7,.76,-12.4,4,['gap','s4','bs1','gap','s4','tb','gap']);
  lv('Difficile 7', 7.8,.76,-12.4,4,['gap','tb','s4','gap','bs1','zz','s2']);
  lv('Difficile 8', 7.8,.77,-12.3,4,['gap','s4','zz','tb','gap','bs1','s3']);
  lv('Difficile 9', 7.9,.77,-12.3,4,['gap','bs1','s4','tb','gap','s4','zz']);
  lv('Difficile 10',7.9,.78,-12.2,4,['gap','tb','bs1','s4','gap','tb','s2']);
  // World 6: Hardcore (51-60)
  lv('Hardcore 1',  8.0,.78,-12.2,5,['gap','s4','tb','bs1','gap','s4','s3']);
  lv('Hardcore 2',  8.0,.79,-12.1,5,['gap','bs1','tb','s4','gap','zz','s4']);
  lv('Hardcore 3',  8.1,.79,-12.1,5,['gap','s4','bs1','s4','gap','tb','s3']);
  lv('Hardcore 4',  8.1,.80,-12.0,5,['gap','tb','s4','bs1','s4','gap','s4']);
  lv('Hardcore 5',  8.2,.80,-12.0,5,['gap','bs1','s4','tb','s4','gap','bs1']);
  lv('Hardcore 6',  8.2,.81,-11.9,5,['gap','s4','tb','s4','bs1','gap','s4']);
  lv('Hardcore 7',  8.3,.81,-11.9,5,['gap','tb','bs1','s4','tb','gap','s3']);
  lv('Hardcore 8',  8.3,.82,-11.8,5,['gap','s4','bs1','tb','s4','bs1','gap']);
  lv('Hardcore 9',  8.4,.82,-11.8,5,['gap','tb','s4','bs1','tb','gap','s4']);
  lv('Hardcore 10', 8.4,.83,-11.7,5,['gap','bs1','tb','s4','bs1','tb','s4']);
  // World 7: Insane (61-70)
  lv('Insane 1',  8.5,.83,-11.7,6,['gap','s4','tb','bs1','s4','tb','gap']);
  lv('Insane 2',  8.5,.84,-11.6,6,['gap','tb','s4','bs1','s4','tb','bs1']);
  lv('Insane 3',  8.6,.84,-11.6,6,['gap','bs1','s4','tb','bs1','s4','tb']);
  lv('Insane 4',  8.6,.85,-11.5,6,['gap','s4','bs1','tb','s4','bs1','s4']);
  lv('Insane 5',  8.7,.85,-11.5,6,['gap','tb','bs1','s4','tb','s4','bs1']);
  lv('Insane 6',  8.7,.86,-11.4,6,['gap','s4','tb','s4','bs1','tb','s4']);
  lv('Insane 7',  8.8,.86,-11.4,6,['gap','bs1','s4','tb','s4','bs1','tb']);
  lv('Insane 8',  8.8,.87,-11.3,6,['gap','tb','s4','bs1','tb','bs1','s4']);
  lv('Insane 9',  8.9,.87,-11.3,6,['gap','s4','bs1','s4','tb','s4','bs1','s4']);
  lv('Insane 10', 8.9,.88,-11.2,6,['gap','tb','bs1','s4','tb','bs1','tb']);
  // World 8: Démon (71-80)
  lv('Démon 1',  9.0,.88,-11.2,7,['gap','s4','tb','s4','bs1','s4','tb','s4']);
  lv('Démon 2',  9.0,.89,-11.1,7,['gap','tb','s4','tb','bs1','s4','bs1']);
  lv('Démon 3',  9.0,.89,-11.1,7,['gap','bs1','tb','s4','tb','s4','bs1','s4']);
  lv('Démon 4',  9.0,.90,-11.0,7,['gap','s4','bs1','tb','s4','tb','bs1','s4']);
  lv('Démon 5',  9.0,.90,-11.0,7,['gap','tb','s4','bs1','s4','tb','s4','bs1']);
  lv('Démon 6',  9.0,.91,-10.9,7,['gap','bs1','s4','tb','bs1','tb','s4','s4']);
  lv('Démon 7',  9.0,.91,-10.9,7,['gap','s4','tb','bs1','s4','bs1','tb','s4']);
  lv('Démon 8',  9.0,.92,-10.8,7,['gap','tb','bs1','s4','bs1','s4','tb','bs1']);
  lv('Démon 9',  9.0,.92,-10.8,7,['gap','s4','bs1','tb','s4','tb','bs1','tb']);
  lv('Démon 10', 9.0,.93,-10.7,7,['gap','tb','s4','tb','bs1','tb','s4','tb']);
  // World 9: Extrême (81-90)
  for(let i=1;i<=10;i++) lv('Extrême '+i,9.0,.93+i*.004,-10.7+i*.02,8,
    ['gap','tb','s4','bs1','tb','s4','tb','bs1','s4','tb']);
  // World 10: Impossible (91-100)
  for(let i=1;i<=10;i++) lv('Impossible '+i,9.0,1.0,-10.0,9,
    ['gap','tb','bs1','tb','s4','tb','bs1','tb','s4','tb','bs1']);
  return L;
}
const LEVELS=makeLevels();

// Progress
let prog={done:[],best:{}};
try{prog=JSON.parse(localStorage.getItem('gd100')||'{"done":[],"best":{}}')}catch(e){}
const saveProg=()=>{try{localStorage.setItem('gd100',JSON.stringify(prog))}catch(e){}};

let selLvl=0;
function buildGrid(){
  const g=document.getElementById('lvlGrid');
  g.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const b=document.createElement('button');
    b.className='lbtn'+(prog.done.includes(i)?' done':'')+(i===selLvl?' sel':'');
    b.textContent=i+1; b.title=lv.name;
    b.onclick=()=>{selLvl=i;buildGrid();};
    g.appendChild(b);
  });
}
buildGrid();

let cube,obs,parts,stars,wX,phase,attempt,lvlAttempt,curLvl,pal,fN,aid;
phase='menu'; attempt=0;

const jump=()=>{
  if(phase!=='playing'||cube.dead)return;
  if(cube.onGround){cube.vy=curLvl.jm;cube.onGround=false;puff();}
};
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
cv.addEventListener('mousedown',jump);
cv.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function buildObs(seq,sp){
  const gy=H-75;
  const GAP=Math.max(150,Math.floor(260*(5.5/sp)));
  const arr=[];
  let x=Math.floor(W*.5);
  seq.forEach(cn=>{
    if(cn==='gap'){x+=GAP;return;}
    const tmpl=CK[cn];if(!tmpl)return;
    tmpl.forEach(o=>arr.push({t:o.t,x:x+o.dx,y:gy-o.h,w:o.w,h:o.h}));
    const mw=tmpl.reduce((m,o)=>Math.max(m,o.dx+o.w),0)||0;
    x+=mw+GAP;
  });
  arr.push({t:'end',x:x+GAP,y:0,w:5,h:H});
  return arr;
}
const mkStars=()=>Array.from({length:100},()=>({x:Math.random()*W,y:Math.random()*(H-75),r:.3+Math.random()*1.6,sp:.07+Math.random()*.4,a:.15+Math.random()*.5}));

function playFromMenu(){startLevel(selLvl);}
function startLevel(i){curLvl=LEVELS[i];pal=PAL[curLvl.pi];attempt++;lvlAttempt=1;document.getElementById('overlay').classList.add('gone');flashLvl(curLvl.name);initPlay(i);}
function retryLevel(i){lvlAttempt++;initPlay(i);}
function initPlay(i){
  curLvl=LEVELS[i];pal=PAL[curLvl.pi];
  const gy=H-75;
  cube={x:Math.floor(W*.22),y:gy-38,vy:0,angle:0,onGround:true,dead:false};
  wX=0;parts=[];stars=mkStars();obs=buildObs(curLvl.seq,curLvl.sp);
  phase='playing';fN=0;
  document.getElementById('hLvl').textContent=curLvl.name;
  document.getElementById('hAttempt').textContent='Essai '+lvlAttempt;
  document.getElementById('pf').style.background=`linear-gradient(90deg,${pal.cu},${pal.sp})`;
  cancelAnimationFrame(aid);tick();
}
function flashLvl(name){
  const el=document.getElementById('lvlFlash');
  el.textContent=name;el.style.color=pal.gl;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1400);
}

function tick(){aid=requestAnimationFrame(tick);fN++;if(phase==='playing')update();draw();}

function update(){
  if(cube.dead){updParts();return;}
  const gy=H-75,CS=38;
  wX+=curLvl.sp;
  cube.vy+=curLvl.gv;cube.y+=cube.vy;
  if(!cube.onGround)cube.angle+=0.09;
  if(cube.y>=gy-CS){cube.y=gy-CS;cube.vy=0;cube.onGround=true;cube.angle=Math.round(cube.angle/(Math.PI/2))*(Math.PI/2);}
  else cube.onGround=false;
  if(cube.vy>20)cube.vy=20;
  const endO=obs[obs.length-1];
  const total=endO.x-Math.floor(W*.5);
  const pct=Math.min(100,Math.floor(wX/total*100));
  if(pct>(prog.best[selLvl]||0)){prog.best[selLvl]=pct;saveProg();}
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('hPct').textContent=pct+'%';
  const cl=cube.x+4,cr=cube.x+CS-4,ct=cube.y+4,cb=cube.y+CS-3;
  for(const o of obs){
    if(o.t==='end'){if(wX>=o.x){winLevel();return;}continue;}
    const ox=o.x-wX;
    if(ox>cr+10||ox+o.w<cl-10)continue;
    const ol=ox,or_=ox+o.w,ot=o.y,ob=o.y+o.h;
    if(cr>ol+2&&cl<or_-2&&cb>ot+2&&ct<ob-2){
      if(o.t==='s'){die();return;}
      if(o.t==='b'){if(cb>ot&&ct<ot&&cube.vy>=0){cube.y=ot-CS;cube.vy=0;cube.onGround=true;cube.angle=Math.round(cube.angle/(Math.PI/2))*(Math.PI/2);}else{die();return;}}
    }
  }
  if(fN%3===0)trail();updParts();
}

function die(){
  if(cube.dead)return;cube.dead=true;burst();
  setTimeout(()=>retryLevel(selLvl),750);
}
function winLevel(){
  cube.dead=true;
  if(!prog.done.includes(selLvl)){prog.done.push(selLvl);saveProg();}
  buildGrid();
  const el=document.getElementById('lvlFlash');
  el.textContent='✅ RÉUSSI !';el.style.color='#4ade80';el.classList.add('show');
  setTimeout(()=>{
    el.classList.remove('show');
    const next=selLvl+1;
    if(next<LEVELS.length){selLvl=next;flashLvl(LEVELS[next].name);setTimeout(()=>initPlay(next),800);}
    else{document.getElementById('ovTitle').textContent='🏆 100/100 !';document.getElementById('ovSub').textContent='Tu as tout terminé !';document.getElementById('overlay').classList.remove('gone');}
  },1600);
}

function trail(){parts.push({x:cube.x+19,y:cube.y+38,vx:-.7,vy:Math.random()*.3-.15,l:1,d:.065,r:5+Math.random()*4,c:pal.gl});}
function puff(){for(let i=0;i<8;i++)parts.push({x:cube.x+Math.random()*38,y:cube.y+38,vx:(Math.random()-.5)*4,vy:-1-Math.random()*3,l:1,d:.07,r:4+Math.random()*4,c:pal.gl});}
function burst(){for(let i=0;i<30;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*7;parts.push({x:cube.x+19,y:cube.y+19,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,l:1,d:.02+Math.random()*.018,r:3+Math.random()*8,c:[pal.cu,pal.gl,'#fff',pal.sp][Math.floor(Math.random()*4)]});}}
function updParts(){parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.14;p.l-=p.d;p.r*=.965;return p.l>0;});}

function draw(){
  cx.clearRect(0,0,W,H);
  if(!pal)pal=PAL[0];
  const gy=H-75,CS=38;
  const sk=cx.createLinearGradient(0,0,0,H);
  sk.addColorStop(0,pal.bg0);sk.addColorStop(1,pal.bg1);
  cx.fillStyle=sk;cx.fillRect(0,0,W,H);
  if(stars)stars.forEach(s=>{s.x-=s.sp;if(s.x<0)s.x=W;cx.save();cx.globalAlpha=s.a;cx.fillStyle='#fff';cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.restore();});
  cx.strokeStyle='rgba(255,255,255,.022)';cx.lineWidth=1;
  const lo=(wX||0)*.22%80;
  for(let y=lo%80;y<gy;y+=80){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  const gg=cx.createLinearGradient(0,gy,0,H);
  gg.addColorStop(0,pal.gr);gg.addColorStop(1,'rgba(0,0,0,.6)');
  cx.fillStyle=gg;cx.fillRect(0,gy,W,75);
  cx.strokeStyle=pal.gl;cx.lineWidth=2.5;cx.shadowColor=pal.gl;cx.shadowBlur=14;
  cx.beginPath();cx.moveTo(0,gy);cx.lineTo(W,gy);cx.stroke();cx.shadowBlur=0;
  cx.strokeStyle='rgba(255,255,255,.05)';cx.lineWidth=1;
  const go2=(wX||0)*.85%48;
  for(let x=-go2;x<W+48;x+=48){cx.beginPath();cx.moveTo(x,gy);cx.lineTo(x,H);cx.stroke();}
  if(obs)obs.forEach(o=>{
    const ox=o.x-wX;
    if(ox>W+60||ox+o.w<-60)return;
    if(o.t==='s'){cx.save();cx.fillStyle=pal.sp;cx.shadowColor=pal.sp;cx.shadowBlur=10;cx.beginPath();cx.moveTo(ox,o.y+o.h);cx.lineTo(ox+o.w/2,o.y);cx.lineTo(ox+o.w,o.y+o.h);cx.closePath();cx.fill();cx.shadowBlur=0;cx.fillStyle='rgba(255,255,255,.22)';cx.beginPath();cx.moveTo(ox+7,o.y+o.h);cx.lineTo(ox+o.w/2,o.y+7);cx.lineTo(ox+o.w/2+5,o.y+o.h);cx.closePath();cx.fill();cx.restore();}
    else if(o.t==='b'){cx.save();cx.fillStyle=pal.bl;cx.shadowColor=pal.gl;cx.shadowBlur=7;cx.fillRect(ox,o.y,o.w,o.h);cx.shadowBlur=0;cx.strokeStyle='rgba(255,255,255,.22)';cx.lineWidth=2;cx.strokeRect(ox+1,o.y+1,o.w-2,o.h-2);cx.strokeStyle='rgba(255,255,255,.06)';cx.lineWidth=1;for(let bx=ox;bx<ox+o.w;bx+=22){cx.beginPath();cx.moveTo(bx,o.y);cx.lineTo(bx,o.y+o.h);cx.stroke();}cx.restore();}
  });
  parts.forEach(p=>{cx.save();cx.globalAlpha=Math.max(0,p.l);cx.fillStyle=p.c;cx.shadowColor=p.c;cx.shadowBlur=7;cx.beginPath();cx.arc(p.x,p.y,Math.max(0,p.r),0,Math.PI*2);cx.fill();cx.shadowBlur=0;cx.restore();});
  if(cube&&(!cube.dead||fN%5<3)){
    cx.save();cx.translate(cube.x+CS/2,cube.y+CS/2);cx.rotate(cube.angle);
    const hs=CS/2;
    cx.fillStyle=pal.cu;cx.shadowColor=pal.gl;cx.shadowBlur=16;cx.fillRect(-hs,-hs,CS,CS);cx.shadowBlur=0;
    cx.fillStyle='rgba(255,255,255,.18)';cx.fillRect(-hs,-hs,CS*.55,CS*.42);
    cx.strokeStyle='rgba(255,255,255,.55)';cx.lineWidth=2;cx.strokeRect(-hs,-hs,CS,CS);
    cx.strokeStyle='rgba(255,255,255,.12)';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(-hs,0);cx.lineTo(hs,0);cx.stroke();
    cx.beginPath();cx.moveTo(0,-hs);cx.lineTo(0,hs);cx.stroke();
    cx.fillStyle='rgba(255,255,255,.9)';cx.beginPath();cx.arc(8,0,5,0,Math.PI*2);cx.fill();
    cx.fillStyle=pal.bg0;cx.beginPath();cx.arc(9.5,0,2.5,0,Math.PI*2);cx.fill();
    cx.restore();
  }
  const vg=cx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.82);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.32)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);
}

pal=PAL[0];
(function menuR(){if(phase!=='menu')return;requestAnimationFrame(menuR);cx.clearRect(0,0,W,H);const sk=cx.createLinearGradient(0,0,0,H);sk.addColorStop(0,'#0d001f');sk.addColorStop(1,'#1e0050');cx.fillStyle=sk;cx.fillRect(0,0,W,H);})();
</script>
